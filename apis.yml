aid: worldbank
name: World Bank
description: >-
  World Bank open data platform providing REST APIs for accessing global development
  data including GDP, poverty indicators, health metrics, education statistics,
  country profiles, financial data, climate information, and project operations.
  All data is freely available under Creative Commons Attribution 4.0 licensing
  with no authentication required for most endpoints.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/worldbank/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Development Data
  - Global Economics
  - GDP
  - Poverty
  - Health Metrics
  - Education
  - Climate
  - Finance
  - World Bank
  - Open Data
  - Country Data
  - Indicators
apis:
  - aid: worldbank-indicators
    name: World Bank Indicators API
    description: >-
      Provides programmatic access to nearly 16,000 time series development
      indicators including GDP, poverty rates, health metrics, education
      statistics, and demographic data across countries and regions. Supports
      filtering by date range, country, region, income level, and lending type.
      Returns data in XML, JSON, JSONP, and JSON-stat formats.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://datahelpdesk.worldbank.org/knowledgebase/articles/889386-developer-information-overview
    baseURL: https://api.worldbank.org/v2
    tags:
      - Indicators
      - Time Series
      - Development Data
      - GDP
      - Poverty
      - Health
      - Education
    properties:
      - type: Documentation
        url: https://datahelpdesk.worldbank.org/knowledgebase/articles/898581-api-basic-call-structures
      - type: OpenAPI
        url: https://api.worldbank.org/v2
    contact:
      - FN: World Bank Data Help Desk
        url: https://datahelpdesk.worldbank.org
        email: data@worldbank.org

  - aid: worldbank-data-catalog
    name: World Bank Data Catalog API
    description: >-
      Provides information about thousands of development-relevant datasets
      available through the World Bank Data Catalog. Supports searching,
      listing, viewing dataset metadata, and downloading resource files.
      Supports OData-style query parameters for filtering, sorting, and
      pagination with up to 100 records per request.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://datahelpdesk.worldbank.org/knowledgebase/articles/1886698-data-catalog-api
    baseURL: https://datacatalogapi.worldbank.org
    tags:
      - Data Catalog
      - Datasets
      - Metadata
      - Development Data
    properties:
      - type: Documentation
        url: https://datahelpdesk.worldbank.org/knowledgebase/articles/1886698-data-catalog-api
    contact:
      - FN: World Bank Data Help Desk
        url: https://datahelpdesk.worldbank.org
        email: data@worldbank.org

  - aid: worldbank-projects
    name: World Bank Projects API
    description: >-
      Provides access to World Bank operations data including active, pipeline,
      and closed projects. Returns project details including financial commitments,
      status, country classification, themes, and team information across IBRD
      and IDA lending operations worldwide.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://datahelpdesk.worldbank.org/knowledgebase/articles/889386-developer-information-overview
    baseURL: https://search.worldbank.org/api/v2/projects
    tags:
      - Projects
      - Operations
      - Loans
      - Development Finance
    properties:
      - type: Documentation
        url: https://datahelpdesk.worldbank.org/knowledgebase/articles/889386-developer-information-overview
    contact:
      - FN: World Bank Data Help Desk
        url: https://datahelpdesk.worldbank.org
        email: data@worldbank.org

  - aid: worldbank-finances
    name: World Bank Finances API
    description: >-
      Provides programmatic access to World Bank financial data including loans,
      credits, trust funds, budget data, and financial statements. Delivered
      through the Finances One platform with support for JSON and CSV output.
      Maximum 1,000 records per request with pagination support.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://financesone.worldbank.org/api-explorer
    baseURL: https://datacatalogapi.worldbank.org/dexapps/fone/api
    tags:
      - Finance
      - Loans
      - Credits
      - Budget
      - Financial Statements
    properties:
      - type: Documentation
        url: https://financesone.worldbank.org/api-explorer
    contact:
      - FN: World Bank Finances
        url: https://financesone.worldbank.org
        email: data@worldbank.org

  - aid: worldbank-sdmx
    name: World Bank SDMX API
    description: >-
      Provides access to World Bank development data in SDMX (Statistical Data
      and Metadata eXchange) format, the international standard for statistical
      data sharing. Supports World Development Indicators (WDI) dataset with
      annual data from 1960 onwards. Limited to 15,000 data points per call.
      Supports SDMX-ML 2.1 and JSON response formats.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://datahelpdesk.worldbank.org/knowledgebase/articles/1886701-sdmx-api-queries
    baseURL: https://api.worldbank.org/v2/sdmx/rest
    tags:
      - SDMX
      - World Development Indicators
      - Statistics
      - International Standards
    properties:
      - type: Documentation
        url: https://datahelpdesk.worldbank.org/knowledgebase/articles/1886701-sdmx-api-queries
    contact:
      - FN: World Bank Data Help Desk
        url: https://datahelpdesk.worldbank.org
        email: data@worldbank.org

